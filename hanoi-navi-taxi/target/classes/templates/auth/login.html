<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ハノイ・ナビタクシー - ハノイで日本語対応タクシーを簡単予約 / Hanoi Navi-Taxi - Đặt taxi tiếng Nhật tại Hà Nội">
    <title>ログイン / Đăng nhập - ハノイ・ナビタクシー</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Language Switcher / 言語切替 -->
<div class="lang-switcher">
    <button class="lang-btn active" data-lang="ja" onclick="switchLang('ja')">🇯🇵 JA</button>
    <button class="lang-btn" data-lang="vi" onclick="switchLang('vi')">🇻🇳 VI</button>
</div>

<div class="auth-container">
    <div class="auth-card glass-card">

        <!-- Logo -->
        <div class="logo-container">
            <div class="logo-icon">🚕</div>
            <div class="logo-text">ハノイ・ナビタクシー</div>
            <div class="logo-subtitle">
                <span data-ja="ハノイで日本語対応タクシーを簡単予約" data-vi="Đặt taxi tiếng Nhật tại Hà Nội dễ dàng">ハノイで日本語対応タクシーを簡単予約</span>
            </div>
        </div>

        <!-- Alert Message -->
        <div id="alertMessage" class="alert">
            <span id="alertIcon"></span>
            <span id="alertText"></span>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <!-- Email -->
            <div class="form-group">
                <label class="form-label" data-ja="メールアドレス" data-vi="Email">メールアドレス</label>
                <input type="email" 
                       id="loginEmail"
                       class="form-input" 
                       placeholder="example@email.com"
                       required
                       autocomplete="email">
                <div class="form-error" id="emailError"></div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" data-ja="パスワード" data-vi="Mật khẩu">パスワード</label>
                <input type="password" 
                       id="loginPassword"
                       class="form-input" 
                       data-placeholder-ja="パスワードを入力"
                       data-placeholder-vi="Nhập mật khẩu"
                       placeholder="パスワードを入力"
                       required
                       autocomplete="current-password">
                <div class="form-error" id="passwordError"></div>
            </div>

            <!-- Remember + Forgot -->
            <div class="flex-between mb-lg">
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="rememberMe">
                    <span class="checkbox-label" data-ja="ログイン情報を記憶" data-vi="Ghi nhớ đăng nhập">ログイン情報を記憶</span>
                </label>
                <a href="#" style="font-size: 0.85rem;" data-ja="パスワードをお忘れですか？" data-vi="Quên mật khẩu?">パスワードをお忘れですか？</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span data-ja="ログイン" data-vi="Đăng nhập">ログイン</span>
            </button>
        </form>

        <!-- Register Link -->
        <div class="divider">
            <span data-ja="または" data-vi="hoặc">または</span>
        </div>

        <div class="text-center">
            <span style="font-size: 0.9rem; color: var(--text-secondary);"
                  data-ja="アカウントをお持ちでないですか？"
                  data-vi="Chưa có tài khoản?">アカウントをお持ちでないですか？</span>
            <a href="/register" style="font-weight: 600; margin-left: 4px;"
               data-ja="新規登録" data-vi="Đăng ký mới">新規登録</a>
        </div>
    </div>
</div>

<script th:src="@{/js/i18n.js}"></script>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
