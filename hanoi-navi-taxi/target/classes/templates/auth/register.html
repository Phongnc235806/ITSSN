<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="新規登録 - ハノイ・ナビタクシー / Đăng ký - Hanoi Navi-Taxi">
    <title>新規登録 / Đăng ký - ハノイ・ナビタクシー</title>
    <link rel="stylesheet"  href="../../static/css/style.css"  th:href="@{/css/style.css}">
</head>
<body class="auth-page">

<!-- Language Switcher -->
<div class="lang-switcher auth-lang-switcher">
    <button class="lang-btn active" data-lang="ja" onclick="switchLang('ja')">🇯🇵 JA</button>
    <button class="lang-btn" data-lang="vi" onclick="switchLang('vi')">🇻🇳 VI</button>
</div>

<div class="auth-container">
    <!-- Header Logo -->
    <div class="auth-logo" aria-label="ハノイ・ナビタクシー">
        <img src="../../static/images/car_icon.png" th:src="@{/images/car_icon.png}" alt="ハノイ ナビタクシー">
    </div>

    <div class="auth-card glass-card auth-card-register">
        <div class="auth-heading">
            <h1 data-ja="新規登録" data-vi="Đăng ký">新規登録</h1>
            <p data-ja="アカウントを作成してください" data-vi="Vui lòng tạo tài khoản">アカウントを作成してください</p>
        </div>

        <!-- Alert -->
        <div id="alertMessage" class="alert">
            <span id="alertIcon"></span>
            <span id="alertText"></span>
        </div>

        <!-- Register Form -->
        <form id="registerForm" onsubmit="handleRegister(event)">
            <!-- Username -->
            <div class="form-group">
                <label class="form-label" data-ja="ユーザー名" data-vi="Tên người dùng">ユーザー名</label>
                <input type="text"
                       id="regFullName"
                       class="form-input"
                       data-placeholder-ja="ユーザー名を入力してください"
                       data-placeholder-vi="Vui lòng nhập tên người dùng"
                       placeholder="ユーザー名を入力してください"
                       required
                       minlength="2"
                       maxlength="100">
                <div class="form-error" id="nameError"></div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label class="form-label" data-ja="メールアドレス" data-vi="Email">メールアドレス</label>
                <input type="email"
                       id="regEmail"
                       class="form-input"
                       data-placeholder-ja="メールアドレスを入力してください"
                       data-placeholder-vi="Vui lòng nhập email"
                       placeholder="メールアドレスを入力してください"
                       required>
                <div class="form-error" id="emailError"></div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" data-ja="パスワード" data-vi="Mật khẩu">パスワード</label>
                <input type="password"
                       id="regPassword"
                       class="form-input"
                       data-placeholder-ja="パスワードを入力してください"
                       data-placeholder-vi="Vui lòng nhập mật khẩu"
                       placeholder="パスワードを入力してください"
                       required
                       minlength="8">
                <div class="form-error" id="passwordError"></div>
                <!-- Password Strength Indicator -->
                <div id="passwordStrength" class="mt-sm" style="display: none;">
                    <div style="height: 4px; background: var(--bg-input); border-radius: 2px; overflow: hidden;">
                        <div id="strengthBar" style="height: 100%; width: 0; transition: all 0.3s;"></div>
                    </div>
                    <div id="strengthText" style="font-size: 0.75rem; margin-top: 4px; color: var(--text-muted);"></div>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label class="form-label" data-ja="パスワード（確認）" data-vi="Xác nhận mật khẩu">パスワード（確認）</label>
                <input type="password"
                       id="regConfirmPassword"
                       class="form-input"
                       data-placeholder-ja="パスワードを再入力してください"
                       data-placeholder-vi="Vui lòng nhập lại mật khẩu"
                       placeholder="パスワードを再入力してください"
                       required>
                <div class="form-error" id="confirmError"></div>
            </div>

            <input type="hidden" id="regPhone" value="">
            <input type="hidden" id="regRole" value="CUSTOMER">

            <!-- Submit -->
            <button type="submit" class="btn btn-primary" id="registerBtn">
                <span data-ja="アカウントを作成" data-vi="Tạo tài khoản">アカウントを作成</span>
            </button>
        </form>

        <!-- Login Link -->
        <div class="auth-footer-link text-center">
            <a href="/login"
               data-ja="すでにアカウントをお持ちの方はこちら"
               data-vi="Đã có tài khoản? Đăng nhập tại đây">すでにアカウントをお持ちの方はこちら</a>
        </div>
    </div>
</div>

<script th:src="@{/js/i18n.js}"></script>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
