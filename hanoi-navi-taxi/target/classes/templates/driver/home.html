<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドライバーホーム / Trang chủ Tài xế - ハノイ・ナビタクシー</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="navbar-brand">
        <span class="icon">🚕</span>
        <span>ハノイ・ナビタクシー</span>
        <span class="badge badge-offline" id="statusBadge">
            <span>●</span>
            <span data-ja="オフライン" data-vi="Ngoại tuyến" id="statusText">オフライン</span>
        </span>
    </div>
    <div class="navbar-user">
        <span class="navbar-username" id="driverName"></span>
        <button class="btn btn-sm btn-outline" onclick="logout()"
                data-ja="ログアウト" data-vi="Đăng xuất">ログアウト</button>
    </div>
</nav>

<div class="main-content">
    <div class="dashboard-container" style="padding-top: var(--space-xl);">

        <!-- Driver Status Toggle -->
        <div class="glass-card" style="padding: var(--space-xl); text-align: center; margin-bottom: var(--space-xl);">
            <h2 style="margin-bottom: var(--space-lg);"
                data-ja="ドライバーステータス" data-vi="Trạng thái tài xế">ドライバーステータス</h2>
            
            <div style="display: flex; align-items: center; justify-content: center; gap: var(--space-lg);">
                <span style="color: var(--text-muted);" data-ja="オフライン" data-vi="Ngoại tuyến">オフライン</span>
                <label class="toggle">
                    <input type="checkbox" id="driverToggle" onchange="toggleDriverStatus()">
                    <span class="toggle-slider"></span>
                </label>
                <span style="color: var(--success-500);" data-ja="オンライン" data-vi="Trực tuyến">オンライン</span>
            </div>

            <p style="color: var(--text-muted); margin-top: var(--space-lg); font-size: 0.9rem;" id="driverMessage"
               data-ja="オンラインにすると、配車リクエストを受け取れます"
               data-vi="Bật trực tuyến để nhận yêu cầu đặt xe">
                オンラインにすると、配車リクエストを受け取れます
            </p>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card glass-card">
                <div class="stat-value">0</div>
                <div class="stat-label" data-ja="今日の乗車数" data-vi="Số chuyến hôm nay">今日の乗車数</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-value">0₫</div>
                <div class="stat-label" data-ja="今日の収入" data-vi="Thu nhập hôm nay">今日の収入</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-value">⭐ --</div>
                <div class="stat-label" data-ja="平均評価" data-vi="Đánh giá trung bình">平均評価</div>
            </div>
        </div>

        <!-- Waiting for requests -->
        <div class="glass-card" style="padding: var(--space-2xl); text-align: center;">
            <div style="font-size: 3rem; margin-bottom: var(--space-md);">🔔</div>
            <h3 data-ja="リクエスト待ち" data-vi="Đang chờ yêu cầu">リクエスト待ち</h3>
            <p style="color: var(--text-muted); margin-top: var(--space-sm);"
               data-ja="新しい配車リクエストがあるとここに表示されます"
               data-vi="Yêu cầu đặt xe mới sẽ hiển thị tại đây">
                新しい配車リクエストがあるとここに表示されます
            </p>
        </div>
    </div>
</div>

<script th:src="@{/js/i18n.js}"></script>
<script>
    // Load user info
    document.addEventListener('DOMContentLoaded', function() {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user.token) { window.location.href = '/login'; return; }
        document.getElementById('driverName').textContent = user.fullName || '';
    });

    function toggleDriverStatus() {
        const toggle = document.getElementById('driverToggle');
        const badge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const lang = localStorage.getItem('navitaxi_lang') || 'ja';
        
        if (toggle.checked) {
            badge.className = 'badge badge-online';
            statusText.textContent = lang === 'ja' ? 'オンライン' : 'Trực tuyến';
        } else {
            badge.className = 'badge badge-offline';
            statusText.textContent = lang === 'ja' ? 'オフライン' : 'Ngoại tuyến';
        }
    }

    function logout() {
        localStorage.removeItem('user');
        document.cookie = 'jwt_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
        window.location.href = '/login';
    }
</script>
</body>
</html>
