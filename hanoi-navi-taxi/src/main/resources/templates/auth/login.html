<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ハノイ・ナビタクシー - ハノイで日本語対応タクシーを簡単予約 / Hanoi Navi-Taxi - Đặt taxi tiếng Nhật tại Hà Nội">
    <title>ログイン / Đăng nhập - ハノイ・ナビタクシー</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">

<!-- Language Switcher / 言語切替 -->
<div class="lang-switcher auth-lang-switcher">
    <button class="lang-btn active" data-lang="ja" onclick="switchLang('ja')">🇯🇵 JA</button>
    <button class="lang-btn" data-lang="vi" onclick="switchLang('vi')">🇻🇳 VI</button>
</div>

<div class="auth-container">
    <!-- Header Logo -->
    <div class="auth-logo" aria-label="ハノイ・ナビタクシー">
        <img src="../../static/images/car_icon.png" th:src="@{/images/car_icon.png}" alt="ハノイ ナビタクシー">
    </div>

    <div class="auth-card glass-card">
        <div class="auth-heading">
            <h1 data-ja="ようこそ!" data-vi="Chào mừng!">ようこそ!</h1>
            <p data-ja="続行するにはログインしてください" data-vi="Vui lòng đăng nhập để tiếp tục">続行するにはログインしてください</p>
        </div>

        <!-- Alert Message -->
        <div id="alertMessage" class="alert">
            <span id="alertIcon"></span>
            <span id="alertText"></span>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <!-- Username -->
            <div class="form-group">
                <label class="form-label" data-ja="ユーザー名" data-vi="Tên người dùng">ユーザー名</label>
                <input type="email"
                       id="loginEmail"
                       class="form-input"
                       data-placeholder-ja="ユーザー名を入力してください..."
                       data-placeholder-vi="Vui lòng nhập tên người dùng..."
                       placeholder="ユーザー名を入力してください..."
                       required
                       autocomplete="email">
                <div class="form-error" id="emailError"></div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" data-ja="パスワード" data-vi="Mật khẩu">パスワード</label>
                <input type="password"
                       id="loginPassword"
                       class="form-input"
                       data-placeholder-ja="パスワードを入力してください..."
                       data-placeholder-vi="Vui lòng nhập mật khẩu..."
                       placeholder="パスワードを入力してください..."
                       required
                       autocomplete="current-password">
                <div class="form-error" id="passwordError"></div>
            </div>

            <!-- Remember + Forgot -->
            <div class="flex-between auth-options mb-lg">
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="rememberMe">
                    <span class="checkbox-label" data-ja="ログイン状態を保持する" data-vi="Duy trì trạng thái đăng nhập">ログイン状態を保持する</span>
                </label>
                <a href="#" data-ja="パスワードをお忘れですか？" data-vi="Quên mật khẩu?">パスワードをお忘れですか？</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span data-ja="ログイン" data-vi="Đăng nhập">ログイン</span>
            </button>
        </form>

        <!-- Register Link -->
        <div class="auth-footer-link text-center">
            <a href="/register"
               data-ja="アカウントをお持ちでない方はこちら（新規登録）"
               data-vi="Chưa có tài khoản? Đăng ký tại đây">アカウントをお持ちでない方はこちら（新規登録）</a>
        </div>
    </div>
</div>

<script th:src="@{/js/i18n.js}"></script>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
