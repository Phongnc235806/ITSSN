<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="予約する - ハノイ・ナビタクシー / Đặt xe - Hanoi Navi-Taxi">
    <title>予約する / Đặt xe - ハノイ・ナビタクシー</title>
    <link rel="stylesheet" href="../../static/css/customer-home.css" th:href="@{/css/customer-home.css}">
</head>
<body class="landing-body booking-body">

<!-- Navbar: customer home と同じ 1〜6 の共通ヘッダー -->
<nav class="navbar landing-navbar" aria-label="メインナビゲーション">
    <a class="navbar-brand landing-brand" href="/customer/home" aria-label="ハノイ・ナビタクシー ホーム">
        <span class="brand-mark" aria-hidden="true">
            <img src="../../static/images/car_icon.png" th:src="@{/images/car_icon.png}" alt="">
        </span>
    </a>

    <div class="landing-nav-links" aria-label="主要メニュー">
        <a class="landing-nav-link" href="/customer/home" data-ja="ホーム" data-vi="Trang chủ">ホーム</a>
        <a class="landing-nav-link active" href="/customer/booking" data-ja="予約する" data-vi="Đặt xe">予約する</a>
        <a class="landing-nav-link" href="#history" data-ja="履歴" data-vi="Lịch sử">履歴</a>
    </div>

    <div class="navbar-user landing-userbar">
        <button class="notification-btn" type="button" aria-label="通知">
            <img class="notification-icon" src="../../static/images/bell_icon.png" th:src="@{/images/bell_icon.png}" alt="" aria-hidden="true">
            <span class="notification-dot" aria-hidden="true"></span>
        </button>
        <button class="profile-chip" type="button" aria-label="ユーザープロフィール">
            <span class="navbar-avatar profile-avatar" id="userAvatar"></span>
            <span class="navbar-username" id="userName" data-i18n-skip="true" data-ja="ユーザー名" data-vi="Tên người dùng">ユーザー名</span>
            <span class="profile-chevron" aria-hidden="true">⌄</span>
        </button>
        <div class="lang-switcher landing-lang-switcher" aria-label="言語切り替え">
            <button class="lang-btn active" type="button" data-lang="ja" onclick="switchLang('ja')">JA</button>
            <button class="lang-btn" type="button" data-lang="vi" onclick="switchLang('vi')">VI</button>
        </div>
        <button class="btn btn-sm btn-outline landing-logout" onclick="logout()"
                data-ja="ログアウト" data-vi="Đăng xuất">ログアウト</button>
    </div>
</nav>

<main class="booking-main" aria-label="配車予約画面">
    <section class="booking-shell">
        <aside class="booking-sidebar" aria-live="polite">
            <!-- 1枚目: 配車依頼 -->
            <section class="booking-step is-active" id="bookingRequestStep" data-step="request">
                <h1 class="booking-title" data-ja="配車依頼" data-vi="Yêu cầu đặt xe">配車依頼</h1>

                <label class="booking-input-wrap" for="bookingPickup">
                    <span class="sr-only" data-ja="出発地" data-vi="Điểm đi">出発地</span>
                    <input class="booking-pill-input" id="bookingPickup" type="text" readonly value="--"
                           data-placeholder-ja="出発地" data-placeholder-vi="Điểm đi" placeholder="出発地">
                </label>

                <label class="booking-input-wrap" for="bookingDestination">
                    <span class="sr-only" data-ja="目的地" data-vi="Điểm đến">目的地</span>
                    <input class="booking-pill-input" id="bookingDestination" type="text" readonly value="--"
                           data-placeholder-ja="目的地" data-placeholder-vi="Điểm đến" placeholder="目的地">
                </label>

                <h2 class="booking-section-title" data-ja="車種" data-vi="Loại xe">車種</h2>
                <div class="booking-vehicle-list" id="bookingVehicleList"></div>

                <button class="booking-primary-btn" type="button" id="driverSearchBtn" onclick="showDriverDetails()"
                        data-ja="検索する" data-vi="Tìm kiếm">検索する</button>
            </section>

            <!-- 2枚目: ドライバー詳細 + クーポン + 金額 -->
            <section class="booking-step" id="driverDetailsStep" data-step="driver">
                <h1 class="booking-title" data-ja="ドライバー詳細画面" data-vi="Màn hình chi tiết tài xế">ドライバー詳細画面</h1>
                <div class="driver-avatar" aria-hidden="true">👤</div>
                <h2 class="driver-profile-heading" data-ja="プロフィール" data-vi="Hồ sơ">プロフィール</h2>

                <dl class="driver-info-list">
                    <div class="driver-info-row">
                        <dt data-ja="車情報" data-vi="Thông tin xe">車情報</dt>
                        <dd id="driverVehicleInfo">--</dd>
                    </div>
                    <div class="driver-info-row">
                        <dt data-ja="電話番号" data-vi="Số điện thoại">電話番号</dt>
                        <dd>0965187176</dd>
                    </div>
                </dl>

                <button class="coupon-card is-selected" type="button" data-discount="10" onclick="selectCoupon(this)">
                    <span data-ja="初回限定10%OFF" data-vi="Giảm 10% lần đầu">初回限定10%OFF</span>
                    <small data-ja="初めてのご利用で10%割引" data-vi="Giảm 10% cho chuyến đầu tiên">初めてのご利用で10%割引</small>
                </button>
                <button class="coupon-card" type="button" data-discount="20" onclick="selectCoupon(this)">
                    <span data-ja="期間限定20%OFF" data-vi="Giảm 20% có thời hạn">期間限定20%OFF</span>
                    <small data-ja="今だけお得なキャンペーン実施中" data-vi="Khuyến mãi đang diễn ra">今だけお得なキャンペーン実施中</small>
                </button>

                <div class="fare-box">
                    <span class="fare-label" data-ja="料金" data-vi="Giá cước">料金</span>
                    <strong id="discountedFare">--</strong>
                    <del id="originalFare">--</del>
                </div>

                <button class="booking-primary-btn" type="button" onclick="submitBooking()" id="confirmBookingBtn"
                        data-ja="確定する" data-vi="Xác nhận">確定する</button>
            </section>

            <!-- 3枚目/4枚目: 走行追跡 + 最終料金 -->
            <section class="booking-step" id="trackingStep" data-step="tracking">
                <h1 class="booking-title tracking-title" data-ja="走行追跡画面" data-vi="Màn hình theo dõi chuyến đi">走行追跡画面</h1>
                <h2 class="booking-section-title" data-ja="配車依頼" data-vi="Yêu cầu đặt xe">配車依頼</h2>

                <div class="tracking-route-box">
                    <div id="trackingPickup" class="tracking-address">--</div>
                    <div id="trackingDestination" class="tracking-address">--</div>
                </div>

                <h2 class="booking-section-title" data-ja="ドライバー詳細画面" data-vi="Màn hình chi tiết tài xế">ドライバー詳細画面</h2>
                <div class="driver-avatar tracking-avatar" aria-hidden="true">👤</div>
                <h3 class="driver-profile-heading" data-ja="プロフィール" data-vi="Hồ sơ">プロフィール</h3>

                <dl class="driver-info-list">
                    <div class="driver-info-row">
                        <dt data-ja="車情報" data-vi="Thông tin xe">車情報</dt>
                        <dd id="trackingVehicleInfo">--</dd>
                    </div>
                    <div class="driver-info-row">
                        <dt data-ja="電話番号" data-vi="Số điện thoại">電話番号</dt>
                        <dd>0965187176</dd>
                    </div>
                </dl>

                <div class="fare-box tracking-fare" id="finalFareBox">
                    <span class="fare-label" data-ja="料金" data-vi="Giá cước">料金</span>
                    <strong id="finalFare">--</strong>
                </div>

                <button class="booking-secondary-btn" type="button" onclick="cancelTracking()" id="cancelTrackingBtn"
                        data-ja="キャンセル" data-vi="Hủy chuyến">キャンセル</button>
            </section>
        </aside>

        <section class="booking-map-card" aria-label="地図表示エリア">
            <div id="map" class="booking-map"></div>
        </section>
    </section>
</main>

<script th:src="@{/js/i18n.js}"></script>
<script th:inline="javascript">
    const GOOGLE_MAPS_API_KEY = /*[[${@environment.getProperty('google.maps.api-key')}]]*/ '';
</script>
<script th:src="@{/js/booking.js}"></script>
<script>
    (function() {
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=places&callback=initBookingMap`;
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
    })();
</script>
</body>
</html>
