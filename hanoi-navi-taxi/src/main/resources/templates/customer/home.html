<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ホーム - ハノイ・ナビタクシー / Trang chủ - Hanoi Navi-Taxi">
    <title>ホーム / Trang chủ - ハノイ・ナビタクシー</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="landing-body">

<!-- Navbar -->
<nav class="navbar landing-navbar" aria-label="メインナビゲーション">
    <a class="navbar-brand landing-brand" href="/customer/home" aria-label="ハノイ・ナビタクシー ホーム">
        <span class="brand-mark" aria-hidden="true">🚕</span>
        <span class="brand-copy">
            <strong>ハノイ</strong>
            <strong>ナビタクシー</strong>
        </span>
    </a>

    <div class="landing-nav-links" aria-label="主要メニュー">
        <a class="landing-nav-link active" href="/customer/home" data-ja="ホーム" data-vi="Trang chủ">ホーム</a>
        <a class="landing-nav-link" href="/customer/booking" data-ja="予約する" data-vi="Đặt xe">予約する</a>
        <a class="landing-nav-link" href="#history" data-ja="履歴" data-vi="Lịch sử">履歴</a>
    </div>

    <div class="navbar-user landing-userbar">
        <button class="notification-btn" type="button" aria-label="通知">
            <span aria-hidden="true">🔔</span>
            <span class="notification-dot" aria-hidden="true"></span>
        </button>
        <button class="profile-chip" type="button" aria-label="ユーザープロフィール">
            <span class="navbar-avatar profile-avatar" id="userAvatar"></span>
            <span class="navbar-username" id="userName" data-ja="ユーザー名" data-vi="Tên người dùng">ユーザー名</span>
            <span class="profile-chevron" aria-hidden="true">⌄</span>
        </button>
        <div class="lang-switcher landing-lang-switcher">
            <button class="lang-btn active" data-lang="ja" onclick="switchLang('ja')">JA</button>
            <button class="lang-btn" data-lang="vi" onclick="switchLang('vi')">VI</button>
        </div>
        <button class="btn btn-sm btn-outline landing-logout" onclick="logout()"
                data-ja="ログアウト" data-vi="Đăng xuất">ログアウト</button>
    </div>
</nav>

<!-- Main Content: Simple Landing Search -->
<main class="landing-main">
    <div id="map" class="landing-hidden-map" aria-hidden="true"></div>

    <section class="landing-hero" aria-labelledby="landingTitle">
        <div class="landing-search-card">
            <h1 id="landingTitle" data-ja="あなたの旅を今すぐ始めよう!" data-vi="Bắt đầu chuyến đi của bạn ngay!">あなたの旅を今すぐ始めよう!</h1>

            <div class="landing-search-row" aria-label="ルート検索フォーム">
                <label class="landing-input-wrap" for="pickupInput">
                    <span class="sr-only" data-ja="出発地" data-vi="Điểm đi">出発地</span>
                    <input type="text"
                           id="pickupInput"
                           class="form-input landing-location-input"
                           data-placeholder-ja="出発地"
                           data-placeholder-vi="Điểm đi"
                           placeholder="出発地"
                           autocomplete="off">
                    <span class="landing-pin" aria-hidden="true">●</span>
                </label>

                <label class="landing-input-wrap" for="destinationInput">
                    <span class="sr-only" data-ja="目的地" data-vi="Điểm đến">目的地</span>
                    <input type="text"
                           id="destinationInput"
                           class="form-input landing-location-input"
                           data-placeholder-ja="目的地"
                           data-placeholder-vi="Điểm đến"
                           placeholder="目的地"
                           autocomplete="off">
                    <span class="landing-pin" aria-hidden="true">●</span>
                </label>
            </div>

            <div class="landing-actions">
                <button class="btn btn-accent landing-search-btn" onclick="searchRoute()" id="searchRouteBtn">
                    <span data-ja="検索する" data-vi="Tìm kiếm">検索する</span>
                </button>
                <button class="landing-current-location" type="button" onclick="useCurrentLocation()" id="currentLocBtn"
                        data-ja="現在地を使用" data-vi="Dùng vị trí hiện tại">現在地を使用</button>
            </div>

            <div id="routeResults" class="route-results landing-route-results" aria-live="polite">
                <div class="route-info">
                    <div class="route-info-item">
                        <div class="route-info-value" id="routeDistance">--</div>
                        <div class="route-info-label" data-ja="距離" data-vi="Khoảng cách">距離</div>
                    </div>
                    <div class="route-info-item">
                        <div class="route-info-value" id="routeDuration">--</div>
                        <div class="route-info-label" data-ja="所要時間" data-vi="Thời gian">所要時間</div>
                    </div>
                </div>

                <h2 class="landing-vehicle-title" data-ja="車種を選択" data-vi="Chọn loại xe">車種を選択</h2>
                <div class="vehicle-list" id="vehicleList"></div>
                <button class="btn btn-primary w-full mt-lg" onclick="confirmBooking()" id="bookBtn" disabled>
                    <span data-ja="配車を確定" data-vi="Xác nhận đặt xe">配車を確定</span>
                </button>
            </div>
        </div>

        <div class="hanoi-illustration" aria-hidden="true">
            <div class="sun-hill"></div>
            <div class="landmark landmark-left">
                <span></span><span></span><span></span><span></span>
            </div>
            <div class="gate">
                <div class="gate-roof top"></div>
                <div class="gate-roof mid"></div>
                <div class="gate-body">
                    <div class="tower left"></div>
                    <div class="arch"></div>
                    <div class="tower right"></div>
                </div>
            </div>
            <div class="torii torii-left"></div>
            <div class="torii torii-right"></div>
            <div class="landmark landmark-right">
                <span></span><span></span><span></span>
            </div>
        </div>
    </section>
</main>

<!-- Booking Success Overlay -->
<div class="booking-overlay" id="bookingOverlay">
    <div class="booking-modal glass-card">
        <div class="booking-success-icon">✅</div>
        <h2 data-ja="配車リクエスト送信完了" data-vi="Đặt xe thành công">配車リクエスト送信完了</h2>
        <p style="color: var(--text-secondary); margin-top: var(--space-md);"
           data-ja="ドライバーを検索中です。しばらくお待ちください..."
           data-vi="Đang tìm tài xế cho bạn. Vui lòng đợi...">
            ドライバーを検索中です。しばらくお待ちください...
        </p>
        <div style="margin-top: var(--space-xl);">
            <div class="btn-loading" style="display: inline-flex; gap: 8px; color: var(--primary-400); font-size: 0.9rem;">
                <div style="width: 18px; height: 18px; border: 2px solid rgba(99,102,241,0.3); border-top-color: var(--primary-400); border-radius: 50%; animation: spin 0.6s linear infinite;"></div>
                <span data-ja="検索中..." data-vi="Đang tìm...">検索中...</span>
            </div>
        </div>
        <button class="btn btn-outline mt-lg" onclick="closeBookingOverlay()"
                data-ja="閉じる" data-vi="Đóng">閉じる</button>
    </div>
</div>

<script th:src="@{/js/i18n.js}"></script>
<script>
    const GOOGLE_MAPS_API_KEY = '[[${@environment.getProperty("google.maps.api-key")}]]' || 'AIzaSyD9AOLzJarLIGW0b-eWq_JEVDf0IcmxE0U';
</script>
<script th:src="@{/js/map.js}"></script>
<script th:src="@{/js/booking.js}"></script>

<!-- Load Google Maps API -->
<script>
    // Dynamic Google Maps script loading
    (function() {
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=places&callback=initMap`;
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
    })();
</script>
</body>
</html>
