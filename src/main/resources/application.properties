spring.application.name=taxi-app
# Nhớ thay PASS_DUNG bằng mật khẩu bạn đã thử ở Bước 1
spring.datasource.url=jdbc:mysql://localhost:3306/taxi_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# Flyway - Thực thi Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JPA - Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true